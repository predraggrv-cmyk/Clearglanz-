<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearglanz – Fahrzeugaufbereitung</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #050505;
    color: white;
}

/* HEADER */
header {
    background: rgba(0,0,0,0.9);
    padding: 15px;
    text-align: center;
}

header img {
    height: 80px;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('IMG_1184.jpeg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h1 {
    background: rgba(0,0,0,0.7);
    padding: 20px;
    font-size: 35px;
}

/* SECTION */
section {
    padding: 50px 20px;
    text-align: center;
}

/* GALERIE */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

.gallery img {
    width: 300px;
    border-radius: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* WHATSAPP BUTTON */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 18px;
}
</style>

</head>

<body>

<header>
    <img src="IMG_1185.jpeg">
</header>

<div class="hero">
    <h1>Dein Auto sieht wieder aus wie neu</h1>
</div>

<section>
    <h2>Vorher / Nachher Ergebnisse</h2>

    <div class="gallery">
        <img src="IMG_1186.jpeg">
        <img src="IMG_1187.jpeg">
        <img src="IMG_1188.jpeg">
        <img src="IMG_1189.jpeg">
        <img src="IMG_1190.jpeg">
    </div>
</section>

<a href="https://wa.me/4915565561816" class="whatsapp">
    WhatsApp
</a>

</body>
</html>
